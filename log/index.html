<!DOCTYPE html>
<html lang="zh-TW">

<head>
    <link rel="icon" type="image/x-icon" href="../images/logo_w.png">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>星崔AI | 更新日誌</title>
    <style>
        :root {
            --bg-dark: #090b0c;
            --bg-deep: #2f3559;
            --primary: #7272b0;
            --accent: #b7a8bd;
            --text-light: #dcd5e5;
            --border-soft: rgba(183, 168, 189, 0.15);
            --sakura: #E87A90;
            /* 當前版本專屬顏色 */
        }

        * {
            padding: 0;
            margin: 0;
            box-sizing: border-box;
            font-family: "PingFang TC", "Microsoft JhengHei", sans-serif;
        }

        body {
            background-color: var(--bg-dark);
            background-image: radial-gradient(circle at 50% 50%, var(--bg-deep) 0%, var(--bg-dark) 100%);
            background-attachment: fixed;
            color: var(--text-light);
            line-height: 1.8;
            overflow-x: hidden;
        }

        /* --- 絲滑鼠標球 CSS --- */
        #follower-ball {
            position: fixed;
            width: 18px;
            height: 18px;
            background-color: var(--accent);
            border-radius: 50%;
            pointer-events: none;
            z-index: 9999;
            /* 僅對透明度做過渡，位移交給 JS 處理才不會抖動 */
            transition: opacity 0.3s ease;
            box-shadow: 0 0 20px var(--primary);
            opacity: 0.5;
            mix-blend-mode: screen;
            will-change: transform;
            left: 0;
            top: 0;
        }

        /* Header 導覽列 */
        header {
            background: rgba(9, 11, 12, 0.7);
            backdrop-filter: blur(15px);
            height: 80px;
            width: 100%;
            position: fixed;
            top: 0;
            left: 0;
            z-index: 1000;
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0 8%;
            border-bottom: 1px solid var(--border-soft);
        }

        .logo-link {
            display: flex;
            align-items: center;
            gap: 16px;
            text-decoration: none;
        }

        .logo-img-box {
            width: 56px;
            height: 56px;
            border-radius: 12px;
            overflow: hidden;
            transition: 0.5s ease;
            box-shadow: 0 10px 15px rgba(0, 0, 0, 0.3);
        }

        .logo-link:hover .logo-img-box {
            transform: scale(1.1);
        }

        .logo-link h1 {
            font-size: 24px;
            font-weight: 700;
            color: #dcd5e5;
            letter-spacing: -0.5px;
        }

        nav ul {
            list-style: none;
            display: flex;
            gap: 40px;
        }

        nav a {
            color: var(--text-light);
            text-decoration: none;
            font-size: 14px;
            opacity: 0.7;
            transition: 0.4s;
            letter-spacing: 1px;
        }

        nav a:hover {
            opacity: 1;
            text-shadow: 0 0 10px var(--primary);
        }

        main {
            max-width: 800px;
            margin: 140px auto 80px;
            padding: 0 25px;
            flex: 1;
        }

        /* --- Log 列表樣式 --- */
        .log-container {
            display: flex;
            flex-direction: column;
            gap: 20px;
        }

        .log-item {
            background: rgba(47, 53, 89, 0.2);
            border: 1px solid var(--border-soft);
            border-radius: 16px;
            overflow: hidden;
            transition: 0.3s;
            cursor: pointer;
        }

        .log-item:hover {
            border-color: var(--primary);
            background: rgba(47, 53, 89, 0.3);
        }

        .log-header {
            padding: 25px;
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        .log-meta {
            display: flex;
            align-items: center;
            gap: 10px;
            flex-wrap: wrap;
        }

        /* 標籤基礎樣式 */
        .tag {
            font-size: 11px;
            font-weight: 800;
            padding: 2px 12px;
            border-radius: 4px;
            text-transform: uppercase;
            border: 1px solid;
        }

        /* 顏色標籤定義 */
        .tag-web {
            color: #7272b0;
            border-color: #7272b0;
            background: rgba(114, 176, 176, 0.05);
        }

        .tag-desktop {
            color: #3b82f6;
            border-color: #3b82f6;
            background: rgba(59, 130, 246, 0.05);
        }

        .tag-release {
            color: #86C166;
            border-color: #86C166;
            background: rgba(134, 193, 102, 0.05);
        }

        .tag-fix {
            color: #F7C242;
            border-color: #F7C242;
            background: rgba(247, 194, 66, 0.05);
        }

        .tag-test {
            color: #E84545;
            border-color: #E84545;
            background: rgba(232, 69, 69, 0.05);
        }

        /* 🌟 當前版本專屬 (櫻色) */
        .tag-current {
            color: #fff;
            border-color: var(--sakura);
            background: var(--sakura);
            box-shadow: 0 0 12px rgba(232, 122, 144, 0.4);
            animation: sakura-glow 2s infinite;
        }

        @keyframes sakura-glow {

            0%,
            100% {
                box-shadow: 0 0 5px rgba(232, 122, 144, 0.4);
            }

            50% {
                box-shadow: 0 0 15px rgba(232, 122, 144, 0.7);
            }
        }

        .log-date {
            font-family: monospace;
            font-size: 13px;
            color: var(--accent);
            margin-right: auto;
        }

        .log-title {
            font-size: 20px;
            color: #fff;
            font-weight: 700;
            margin-top: 5px;
        }

        /* 開合內容動畫 */
        .log-content {
            max-height: 0;
            overflow: hidden;
            transition: all 0.4s cubic-bezier(0, 1, 0, 1);
            background: rgba(0, 0, 0, 0.2);
            padding: 0 25px;
        }

        .log-item.active .log-content {
            max-height: 1000px;
            padding: 20px 25px 30px;
            transition: all 0.4s ease-in;
        }

        .log-content ul {
            padding-left: 20px;
            color: var(--accent);
            font-size: 15px;
        }

        .log-content li {
            margin-bottom: 8px;
        }

        footer {
            padding: 60px;
            text-align: center;
            font-size: 13px;
            letter-spacing: 2px;
            opacity: 0.3;
        }

        @media (max-width: 640px) {
            header {
                padding: 0 20px;
            }

            nav {
                display: none;
            }
        }
    </style>
</head>

<body>
    <!-- 鼠標追隨球 -->
    <div id="follower-ball"></div>

    <div class="shell">
        <header>
            <a href="../" class="logo-link">
                <div class="logo-img-box"><img src="../images/logo_w.png" alt="Logo"
                        style="width:100%; height:100%; object-fit:cover;"></div>
                <h1>星崔AI</h1>
            </a>
            <nav>
                <ul id="nav-menu">
                    <li><a href="../log/" style="color:#fff; opacity:1;">更新日誌</a></li>
                    <li><a href="../download/">安裝教學</a></li>
                    <li><a href="../introduce/">軟體介紹</a></li>
                    <li><a href="../about/">關於我們</a></li>
                    <li id="auth-link-container"><a href="../login/" id="auth-link">登入</a></li>
                </ul>
            </nav>
        </header>

        <main>
            <div style="text-align: center; margin-bottom: 50px;">
                <h2 style="font-size: 36px; color: #fff; font-weight: 800;">更新日誌</h2>
                <p style="color: var(--accent); opacity: 0.8;">追蹤星崔 AI 的演進與優化歷程</p>
                <p style="color: #7bb4ff; opacity: 0.8;">點選紀錄查看詳細說明</p>
            </div>

            <div id="log-list" class="log-container">
                <!-- 由 JS 從 log.json 載入 -->
                <p style="text-align: center; opacity: 0.5;">正在載入日誌數據...</p>
            </div>
        </main>

        <footer>
            <p>&copy; 2026 -
                <script>document.write(new Date().getFullYear())</script> The Sentry AI All Rights Reserved.
            </p>
        </footer>
    </div>

    <!-- Firebase & Log Logic -->
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/12.5.0/firebase-app.js";
        import { getAuth, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/12.5.0/firebase-auth.js";

        // Firebase 配置 (維持不變)
        const firebaseConfig = {
            apiKey: "AIzaSyCtbjdi-x3E3eNgX8WvBtgibOTRG4idny4",
            authDomain: "workai-1d692.firebaseapp.com",
            projectId: "workai-1d692",
            storageBucket: "workai-1d692.firebasestorage.app",
            appId: "1:156453625217:web:7ef3a3642481c52449dc80"
        };
        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);

        // 更新導覽列登入狀態
        onAuthStateChanged(auth, (user) => {
            const authLink = document.getElementById('auth-link');
            if (user) {
                authLink.innerText = "儀錶板";
                authLink.href = "../dashboard/";
            }
        });

        // 讀取 JSON 並渲染日誌
        async function fetchLogs() {
            try {
                const response = await fetch('log.json');
                const logs = await response.json();
                renderLogs(logs);
            } catch (error) {
                document.getElementById('log-list').innerHTML = `<p style="color:var(--sakura); text-align:center;">日誌檔案讀取失敗。</p>`;
            }
        }

        function renderLogs(logs) {
            const list = document.getElementById('log-list');
            list.innerHTML = '';

            logs.forEach(log => {
                const item = document.createElement('div');
                item.className = 'log-item';

                // 處理標籤
                const projectClass = log.project === 'web' ? 'tag-web' : 'tag-desktop';
                const projectName = log.project === 'web' ? '網頁端' : '桌面端';

                let typeClass = '', typeName = '';
                switch (log.type) {
                    case 'release': typeClass = 'tag-release'; typeName = '版本發布'; break;
                    case 'fix': typeClass = 'tag-fix'; typeName = '錯誤修正'; break;
                    case 'test': typeClass = 'tag-test'; typeName = '測試版本'; break;
                }

                const currentTag = log.current === true ? `<span class="tag tag-current">當前版本</span>` : '';

                item.innerHTML = `
                    <div class="log-header">
                        <div class="log-meta">
                            ${currentTag}
                            <span class="tag ${projectClass}">${projectName}</span>
                            <span class="tag ${typeClass}">${typeName}</span>
                            <span class="log-date">${log.date}</span>
                        </div>
                        <h3 class="log-title">${log.title}</h3>
                    </div>
                    <div class="log-content">${log.content}</div>
                `;

                item.onclick = () => {
                    // 切換開合狀態
                    item.classList.toggle('active');
                };

                list.appendChild(item);
            });
        }

        fetchLogs();

        // --- 絲滑鼠標球 JS 邏輯 ---
        const ball = document.getElementById('follower-ball');
        let mouseX = window.innerWidth / 2;
        let mouseY = window.innerHeight / 2;
        let ballX = mouseX;
        let ballY = mouseY;

        document.addEventListener('mousemove', (e) => {
            mouseX = e.clientX;
            mouseY = e.clientY;
        });

        function animateBall() {
            // 線性插值動畫 (Lerp)
            ballX += (mouseX - ballX) * 0.12;
            ballY += (mouseY - ballY) * 0.12;

            // 關鍵：-9 補償球體寬高的一半，使其精確對準中心
            ball.style.transform = `translate(${ballX - 9}px, ${ballY - 9}px)`;

            requestAnimationFrame(animateBall);
        }
        animateBall();
    </script>
</body>

</html>
