## 一、個人資料的收集與類別
當您使用本服務時，我們可能會收集以下資料：
1. 使用者主動提供： 您的姓名、電子郵件地址（Email）。
2. 系統自動收集（登入憑證）： 當您登入網站時，系統會產生並儲存 Cookies 或 登入憑證 (Authentication Tokens)。這些資訊是用於辨識您的身分，維持您的登入狀態，確保您不需重複輸入密碼即可使用相關功能。
3. 電腦程式紀錄： 若您使用本團隊之電腦程式，相關的操作行為紀錄可能會被記錄以用於功能運行與優化。


## 二、資料收集之目的
我們收集資料的主要目的包括：
1. 處理訂單與帳務： 若涉及任何服務授權或交易處理。
2. 行銷推廣： 寄送與本服務相關的最新消息或更新通知。
3. 改進產品體驗： 分析使用數據以優化網站與程式的功能。
4. 技術支援： 根據您的請求進行故障排除或回覆詢問。


## 三、資料儲存與安全保護
1. 儲存地點： 您的個人資料與相關紀錄儲存於 Google Firebase 雲端平台。
2. 安全性措施：
    * 我們的網站託管於 GitHub Pages，並使用 Firebase 作為後端儲存。
    * 雖然我們無法直接控制其底層技術，但 Firebase 與 GitHub 均採用業界標準的加密技術（如 SSL/TLS）與資料庫防火牆，以防止未經授權的存取。


## 四、資料保存與刪除
1. 帳號資料： 當您選擇刪除帳號或我們終止服務時，您的帳號個人資料將會立即從資料庫中移除。
2. 使用紀錄： 為了分析產品效能與優化體驗，您的服務使用紀錄（非個人辨識資訊）可能會繼續保留於我們的系統中。

## 五、使用者權利與資料行使
1. 查詢與閱覽： 您可以透過登入本服務的儀表板，隨時查詢您的個人資料與操作紀錄。
2. 資料複製（JSON）： 您可以透過本電腦端程式的同步功能，將相關資料匯出為 JSON 格式檔案。
3. 更正與刪除限制： 目前本服務暫不開放使用者自行線上更正或刪除特定歷史紀錄。如您有特殊需求，請透過電子郵件與我們聯繫。

## 六、第三方共用政策
本團隊不會將您的個人資料出售、交換、或出租給其他個人、團體、私人企業或公務機關。除非法律要求或為了履行服務契約（如金流處理）之必要。

    <!-- UI 互動腳本 -->
    <script>
        document.addEventListener('DOMContentLoaded', () => {
            const menuBtn = document.querySelector('.menu');
            const navMenu = document.getElementById('nav-menu');

            if (menuBtn && navMenu) {
                menuBtn.addEventListener('click', (e) => {
                    e.stopPropagation();
                    navMenu.classList.toggle('show');
                });
                document.addEventListener('click', (e) => {
                    if (navMenu.classList.contains('show') && !navMenu.contains(e.target) && !menuBtn.contains(e.target)) {
                        navMenu.classList.remove('show');
                    }
                });
            }

            const ball = document.getElementById('follower-ball');
            let mouseX = window.innerWidth / 2;
            let mouseY = window.innerHeight / 2;
            let ballX = mouseX, ballY = mouseY;

            document.addEventListener('mousemove', (e) => {
                mouseX = e.clientX; mouseY = e.clientY;
            });

            function animateBall() {
                ballX += (mouseX - ballX) * 0.1;
                ballY += (mouseY - ballY) * 0.1;
                ball.style.transform = `translate(${ballX - 9}px, ${ballY - 9}px)`;
                requestAnimationFrame(animateBall);
            }
            animateBall();
        });
    </script>
