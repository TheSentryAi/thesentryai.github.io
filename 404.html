<!DOCTYPE html>
<html lang="zh-TW">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="icon" type="image/x-icon" href="images/logo_w.png">
    <title>星崔AI | 404 Not Found</title>
    <style>
        :root {
            --bg-dark: #090b0c;
            --bg-deep: #2f3559;
            --primary: #7272b0;
            --accent: #b7a8bd;
            --text-light: #dcd5e5;
            --border-soft: rgba(183, 168, 189, 0.15);
        }

        * {
            padding: 0;
            margin: 0;
            box-sizing: border-box;
            font-family: "PingFang TC", "Microsoft JhengHei", sans-serif;
        }

        body {
            background-color: var(--bg-dark);
            background-image: radial-gradient(circle at 50% 50%, var(--bg-deep) 0%, var(--bg-dark) 100%);
            background-attachment: fixed;
            color: var(--text-light);
            line-height: 1.8;
            overflow: hidden;
        }

        .shell {
            min-height: 100vh;
            display: flex;
            flex-direction: column;
        }

        header {
            background: rgba(9, 11, 12, 0.7);
            backdrop-filter: blur(15px);
            height: 80px;
            width: 100%;
            display: flex;
            align-items: center;
            padding: 0 8%;
            border-bottom: 1px solid var(--border-soft);
        }

        .logo-link {
            display: flex;
            align-items: center;
            gap: 16px;
            text-decoration: none;
        }

        .logo-img-box {
            width: 56px;
            height: 56px;
            border-radius: 12px;
            overflow: hidden;
            box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.3);
        }

        .logo-img-box img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .logo-link h1 {
            font-size: 24px;
            font-weight: 700;
            color: #dcd5e5;
            letter-spacing: -0.5px;
        }

        main {
            flex: 1;
            display: flex;
            flex-direction: column;
            /* 讓內容垂直排列 */
            align-items: center;
            justify-content: center;
            padding: 0 25px;
            gap: 40px;
            /* 標題與按鈕的間距 */
        }

        h2 {
            font-size: 24px;
            color: #fff;
            font-weight: 500;
            letter-spacing: 1px;
            text-align: center;
            animation: pulse 2s infinite;
        }

        /* --- 新增按鈕樣式 --- */
        .back-home {
            text-decoration: none;
            color: #fff;
            padding: 12px 32px;
            border: 1px solid var(--primary);
            border-radius: 30px;
            font-size: 16px;
            font-weight: 500;
            letter-spacing: 2px;
            transition: all 0.3s ease;
            background: rgba(114, 114, 176, 0.1);
            backdrop-filter: blur(5px);
        }

        .back-home:hover {
            background: var(--primary);
            box-shadow: 0 0 20px rgba(114, 114, 176, 0.4);
            transform: translateY(-2px);
        }

        @keyframes pulse {
            0% {
                opacity: 0.6;
            }

            50% {
                opacity: 1;
            }

            100% {
                opacity: 0.6;
            }
        }

        footer {
            padding: 40px;
            text-align: center;
            font-size: 13px;
            letter-spacing: 2px;
            opacity: 0.3;
        }
    </style>
</head>

<body>
    <div class="shell">
        <header>
            <a href="/" class="logo-link">
                <div class="logo-img-box">
                    <img src="/images/logo_w.png" alt="Logo">
                </div>
                <h1>星崔AI</h1>
            </a>
        </header>

        <main>
            <h1 style="text-align: center;">404<br>找不到頁面</h1>
            <h2>您請求連線的頁面不存在或是已被轉移至其他網址</h2>
            <a href="/" class="back-home">返回首頁</a>
        </main>

        <footer>
            <p>&copy; 2026 -
                <script>document.write(new Date().getFullYear())</script> The Sentry AI All Rights Reserved.
            </p>
        </footer>
    </div>
</body>

</html>
