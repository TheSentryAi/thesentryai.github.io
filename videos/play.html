<!DOCTYPE html>
<html lang="zh-TW">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="icon" type="image/x-icon" href="../images/logo_w.png">
    <title>星崔AI | 影片播放</title>
    <style>
        /* --- 基礎共用樣式 (完全對齊你的設計) --- */
        :root {
            --bg-dark: #090b0c;
            --bg-deep: #2f3559;
            --primary: #7272b0;
            --accent: #b7a8bd;
            --text-light: #dcd5e5;
            --glass: rgba(47, 53, 89, 0.25);
            --border-soft: rgba(183, 168, 189, 0.15);
            --gold: #d4af37;
        }

        * {
            padding: 0;
            margin: 0;
            box-sizing: border-box;
            font-family: "PingFang TC", "Microsoft JhengHei", sans-serif;
        }

        body {
            background-color: var(--bg-dark);
            background-image: radial-gradient(circle at 50% 50%, var(--bg-deep) 0%, var(--bg-dark) 100%);
            background-attachment: fixed;
            color: var(--text-light);
            line-height: 1.8;
            overflow-x: hidden;
        }

        .shell {
            min-height: 100vh;
            display: flex;
            flex-direction: column;
        }

        #follower-ball {
            position: fixed;
            width: 18px;
            height: 18px;
            background-color: var(--accent);
            border-radius: 50%;
            pointer-events: none;
            z-index: 9999;
            transition: opacity 0.3s ease;
            box-shadow: 0 0 20px var(--primary);
            opacity: 0.5;
            mix-blend-mode: screen;
            display: block;
        }

        header {
            background: rgba(9, 11, 12, 0.7);
            backdrop-filter: blur(15px);
            height: 80px;
            width: 100%;
            position: fixed;
            top: 0;
            left: 0;
            z-index: 1000;
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0 8%;
            border-bottom: 1px solid var(--border-soft);
        }

        .logo-link {
            display: flex;
            align-items: center;
            gap: 16px;
            text-decoration: none;
            cursor: pointer;
        }

        .logo-img-box {
            position: relative;
            width: 56px;
            height: 56px;
            border-radius: 12px;
            overflow: hidden;
            box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.3);
            transition: transform 0.5s ease;
        }

        .logo-img-box img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .logo-link h1 {
            font-size: 24px;
            font-weight: 700;
            color: #dcd5e5;
            letter-spacing: -0.5px;
            transition: color 0.3s ease;
            margin: 0;
            background: none;
            -webkit-text-fill-color: initial;
        }

        .logo-link:hover .logo-img-box {
            transform: scale(1.1);
        }

        .logo-link:hover h1 {
            color: #ffffff;
        }

        nav ul {
            list-style: none;
            display: flex;
            gap: 40px;
        }

        nav a {
            color: var(--text-light);
            text-decoration: none;
            font-weight: 400;
            font-size: 14px;
            transition: 0.4s;
            opacity: 0.7;
            letter-spacing: 1px;
        }

        nav a:hover {
            color: #fff;
            opacity: 1;
            text-shadow: 0 0 10px var(--primary);
        }

        #logout-btn {
            cursor: pointer;
            display: none;
        }

        .menu {
            display: none;
            background: none;
            border: none;
            color: var(--text-light);
            font-size: 28px;
            cursor: pointer;
            z-index: 1001;
        }

        main {
            max-width: 1000px;
            margin: 120px auto 80px;
            padding: 0 25px;
            flex: 1;
        }

        /* --- 影片頁專屬樣式 --- */

        .page-title {
            text-align: center;
            margin-bottom: 40px;
        }

        .page-title h2 {
            font-size: 42px;
            font-weight: 800;
            color: #fff;
            margin-bottom: 10px;
            text-shadow: 0 0 20px rgba(114, 114, 176, 0.5);
        }

        .page-title p {
            color: var(--accent);
            font-size: 18px;
            letter-spacing: 1px;
        }

        .main-player-wrapper {
            background: rgba(9, 11, 12, 0.8);
            border: 1px solid var(--primary);
            border-radius: 20px;
            padding: 15px;
            box-shadow: 0 20px 50px rgba(0, 0, 0, 0.6), inset 0 0 20px rgba(114, 114, 176, 0.2);
            margin-bottom: 30px;
            animation: glow-border 4s infinite alternate;
        }

        @keyframes glow-border {
            0% {
                box-shadow: 0 20px 50px rgba(0, 0, 0, 0.6), 0 0 10px rgba(114, 114, 176, 0.2);
            }

            100% {
                box-shadow: 0 20px 50px rgba(0, 0, 0, 0.6), 0 0 25px rgba(114, 114, 176, 0.6);
            }
        }

        .video-container {
            position: relative;
            width: 100%;
            padding-bottom: 56.25%;
            border-radius: 12px;
            overflow: hidden;
            background: #000;
        }

        .video-container iframe {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            border: none;
        }

        .now-playing-info {
            background: rgba(47, 53, 89, 0.2);
            padding: 25px 30px;
            border-radius: 16px;
            border: 1px solid var(--border-soft);
            margin-bottom: 60px;
        }

        #video-title {
            font-size: 24px;
            font-weight: bold;
            color: #fff;
            margin-bottom: 10px;
        }

        #video-desc {
            color: var(--accent);
            line-height: 1.6;
            font-size: 15px;
        }

        .playlist-title {
            font-size: 20px;
            color: #fff;
            margin-bottom: 20px;
            border-left: 4px solid var(--primary);
            padding-left: 15px;
        }

        .playlist-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: 25px;
        }

        .video-card {
            background: rgba(9, 11, 12, 0.5);
            border: 1px solid var(--border-soft);
            border-radius: 16px;
            overflow: hidden;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .video-card:hover {
            transform: translateY(-8px);
            border-color: var(--primary);
            background: rgba(47, 53, 89, 0.4);
            box-shadow: 0 10px 25px rgba(0, 0, 0, 0.4);
        }

        .card-thumbnail {
            position: relative;
            width: 100%;
            padding-bottom: 56.25%;
            background-color: #000;
        }

        .card-thumbnail img {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            object-fit: cover;
            opacity: 0.8;
            transition: 0.3s;
        }

        .video-card:hover .card-thumbnail img {
            opacity: 1;
        }

        .play-icon {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 48px;
            height: 48px;
            background: rgba(114, 114, 176, 0.8);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            opacity: 0;
            transition: 0.3s;
        }

        .play-icon::after {
            content: '';
            display: block;
            border-left: 15px solid #fff;
            border-top: 10px solid transparent;
            border-bottom: 10px solid transparent;
            margin-left: 5px;
        }

        .video-card:hover .play-icon {
            opacity: 1;
            transform: translate(-50%, -50%) scale(1.1);
        }

        .card-info {
            padding: 15px 20px;
        }

        .card-info h4 {
            color: #fff;
            font-size: 16px;
            margin-bottom: 5px;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .card-info p {
            color: var(--accent);
            font-size: 13px;
            display: -webkit-box;
            -webkit-line-clamp: 2;
            -webkit-box-orient: vertical;
            overflow: hidden;
        }

        footer {
            padding: 60px;
            text-align: center;
            font-size: 13px;
            letter-spacing: 2px;
            opacity: 0.3;
        }

        /* --- 手機版響應式設計 --- */
        @media (max-width: 768px) {
            header {
                padding: 0 20px;
            }

            .menu {
                display: block;
            }

            nav ul {
                position: fixed;
                top: 0;
                right: -100%;
                width: 100%;
                height: 100vh;
                background: var(--bg-dark);
                flex-direction: column;
                justify-content: center;
                align-items: center;
                transition: 0.5s cubic-bezier(0.77, 0, 0.175, 1);
                z-index: 1000;
                gap: 25px;
            }

            nav ul.show {
                right: 0;
            }

            main {
                padding: 0 15px;
            }

            .main-player-wrapper {
                padding: 5px;
                border-radius: 12px;
            }

            header nav {
                position: absolute;
            }
        }

        html,
        body {
            overflow-x: hidden;
            width: 100vw;
        }
    </style>

<body>
    <div id="follower-ball"></div>

    <div class="shell">
        <header>
            <a href="../" class="logo-link">
                <div class="logo-img-box"><img src="../images/logo_w.png" alt="Logo" style="width:100%"></div>
                <h1>星崔AI</h1>
            </a>
            <button class="menu">&#9776;</button>
            <nav>
                <ul id="nav-menu">
                    <!-- 導覽列維持一致 -->
                    <li><a href="../log/">更新日誌</a></li>
                    <li><a href="../download/">安裝教學</a></li>
                    <li><a href="../introduce/">軟體介紹</a></li>
                    <li><a href="./" style="color:#fff; opacity:1;">影音教學</a></li>
                    <li><a href="../about/">關於我們</a></li>
                </ul>
            </nav>
        </header>

        <main style="max-width: 900px;">
            <!-- 返回目錄按鈕 -->
            <a href="./" class="back-btn">← 返回教學清單</a>

            <!-- 主播放器區塊 -->
            <div class="main-player-wrapper">
                <div class="video-container">
                    <iframe id="main-player" src="" frameborder="0"
                        allow="autoplay; encrypted-media; picture-in-picture" allowfullscreen></iframe>
                </div>
            </div>

            <!-- 影片資訊 -->
            <div class="now-playing-info">
                <h3 id="video-title">載入中...</h3>
                <p id="video-desc">請稍候，正在同步影像資料...</p>
            </div>
        </main>

        <footer>
            <p>&copy; 2026 -
                <script>document.write(new Date().getFullYear())</script> The Sentry AI All Rights Reserved.
            </p>
            <p>影片、縮圖及說明未經本團隊書面允許，嚴禁轉錄、轉載。</p>
        </footer>
    </div>

    <script>
        // 🌟 影片資料庫：以後有新影片，只要加在這裡面就好！
        const videoDatabase = {
            'QG0imflHcv4': {
                title: '【星崔AI】Beta 0.4.0 示範影片｜The Sentry AI',
                desc: '在這支影片中，我們將帶您了解如何下載並安裝星崔 AI 桌面端軟體，以及系統的基本功能操作介紹。'
            },
        };

        // 核心邏輯：讀取網址上的 ?v= 參數，動態替換內容
        document.addEventListener('DOMContentLoaded', () => {
            const urlParams = new URLSearchParams(window.location.search);
            const videoId = urlParams.get('v') || 'QG0imflHcv4'; // 預設影片

            // 查表替換內容
            if (videoDatabase[videoId]) {
                document.getElementById('main-player').src = `https://www.youtube.com/embed/${videoId}?autoplay=1&rel=0`;
                document.getElementById('video-title').textContent = videoDatabase[videoId].title;
                document.getElementById('video-desc').textContent = videoDatabase[videoId].desc;
            } else {
                document.getElementById('video-title').textContent = '找不到影片';
                document.getElementById('video-desc').textContent = '很抱歉，這支教學影片可能已被移除或連結錯誤。';
            }



            document.addEventListener('DOMContentLoaded', () => {
                const menuBtn = document.querySelector('.menu');
                const navMenu = document.getElementById('nav-menu');

                if (menuBtn && navMenu) {
                    menuBtn.addEventListener('click', (e) => {
                        e.stopPropagation();
                        navMenu.classList.toggle('show');
                    });
                    document.addEventListener('click', (e) => {
                        if (navMenu.classList.contains('show') && !navMenu.contains(e.target) && !menuBtn.contains(e.target)) {
                            navMenu.classList.remove('show');
                        }
                    });
                }

                const ball = document.getElementById('follower-ball');
                let mouseX = window.innerWidth / 2;
                let mouseY = window.innerHeight / 2;
                let ballX = mouseX, ballY = mouseY;

                document.addEventListener('mousemove', (e) => {
                    mouseX = e.clientX; mouseY = e.clientY;
                });

                function animateBall() {
                    ballX += (mouseX - ballX) * 0.1;
                    ballY += (mouseY - ballY) * 0.1;
                    ball.style.transform = `translate(${ballX - 9}px, ${ballY - 9}px)`;
                    requestAnimationFrame(animateBall);
                }
                animateBall();
            });
        });
    </script>
</body>

</html>
