<!DOCTYPE html>
<html lang="zh-TW">

<head>
    <link rel="icon" type="image/x-icon" href="../images/logo_w.png">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>星崔AI | 找回密碼</title>
    <style>
        :root {
            --bg-dark: #090b0c;
            --bg-deep: #2f3559;
            --primary: #7272b0;
            --accent: #b7a8bd;
            --text-light: #dcd5e5;
            --glass: rgba(9, 11, 12, 0.65);
            --border-soft: rgba(183, 168, 189, 0.2);
        }

        * {
            padding: 0;
            margin: 0;
            box-sizing: border-box;
            font-family: "PingFang TC", "Microsoft JhengHei", sans-serif;
            transition: all 0.4s cubic-bezier(0.165, 0.84, 0.44, 1);
        }

        body {
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            background-color: var(--bg-dark);
            background-image: radial-gradient(circle at 50% 50%, var(--bg-deep) 0%, var(--bg-dark) 100%);
            overflow: hidden;
            color: var(--text-light);
        }

        /* 忘記密碼卡片 */
        .reset-card {
            position: relative;
            z-index: 10;
            width: 420px;
            padding: 60px 45px;
            background: var(--glass);
            backdrop-filter: blur(20px);
            border: 1px solid var(--border-soft);
            border-radius: 40px;
            box-shadow: 0 20px 50px rgba(0, 0, 0, 0.5);
            text-align: center;
        }

        .reset-card:hover {
            border-color: var(--primary);
            box-shadow: 0 0 30px rgba(114, 114, 176, 0.4);
            transform: translateY(-5px);
        }

        .title-group {
            margin-bottom: 40px;
        }

        h2 {
            font-size: 38px;
            letter-spacing: 10px;
            color: #ffffff;
            font-weight: 700;
            margin-bottom: 6px;
        }

        .subtitle {
            font-size: 12px;
            letter-spacing: 5px;
            color: var(--accent);
            text-transform: uppercase;
            opacity: 0.8;
        }

        p.instruction {
            font-size: 14px;
            color: var(--accent);
            margin-bottom: 30px;
            line-height: 1.6;
        }

        .input-group {
            margin-bottom: 24px;
            width: 100%;
        }

        input[type="email"] {
            width: 100%;
            padding: 16px 22px;
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 15px;
            outline: none;
            color: #fff;
            font-size: 15px;
        }

        input:focus {
            border-color: var(--primary);
            box-shadow: 0 0 15px rgba(114, 114, 176, 0.3);
        }

        .btn-reset {
            width: 100%;
            padding: 16px;
            background: var(--primary);
            border: none;
            border-radius: 15px;
            color: #fff;
            font-size: 18px;
            font-weight: 600;
            letter-spacing: 4px;
            cursor: pointer;
            box-shadow: 0 8px 20px rgba(0, 0, 0, 0.3);
        }

        .btn-reset:hover {
            background: #8484c4;
            letter-spacing: 6px;
        }

        .btn-reset:disabled {
            background: #3a3a4a;
            cursor: not-allowed;
        }

        .back-to-login {
            margin-top: 30px;
            display: block;
            font-size: 13px;
            color: var(--accent);
            text-decoration: none;
            opacity: 0.7;
        }

        .back-to-login:hover {
            opacity: 1;
            color: #fff;
            text-decoration: underline;
        }

        #message {
            margin-top: 20px;
            font-size: 13px;
            min-height: 20px;
        }

        .error {
            color: #ff8080;
        }

        .success {
            color: #a0d9a0;
        }

        .info {
            color: var(--accent);
        }

        @media (max-width: 480px) {
            .reset-card {
                width: 90%;
                padding: 50px 30px;
            }
        }
    </style>
</head>

<body>

    <div class="reset-card">
        <div class="title-group">
            <h2>找回密碼</h2>
            <div class="subtitle">FORGET PASSWORD</div>
        </div>

        <p class="instruction">請輸入您的註冊電子郵件，<br>我們將發送重設密碼的連結給您。</p>

        <div class="input-group">
            <input type="email" id="reset-email" placeholder="電子郵件" required>
        </div>

        <button class="btn-reset" id="resetBtn">發送驗證郵件</button>

        <div id="message"></div>

        <a href="../login/" class="back-to-login">返回登入</a>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/12.5.0/firebase-app.js";
        import { getAuth, sendPasswordResetEmail } from "https://www.gstatic.com/firebasejs/12.5.0/firebase-auth.js";

        // Firebase 配置 (與登入頁相同)
        const firebaseConfig = {
            apiKey: "AIzaSyCtbjdi-x3E3eNgX8WvBtgibOTRG4idny4",
            authDomain: "workai-1d692.firebaseapp.com",
            projectId: "workai-1d692",
            storageBucket: "workai-1d692.firebasestorage.app",
            messagingSenderId: "156453625217",
            appId: "1:156453625217:web:7ef3a3642481c52449dc80"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);

        const emailInput = document.getElementById('reset-email');
        const resetBtn = document.getElementById('resetBtn');
        const messageDiv = document.getElementById('message');

        function showMessage(text, type) {
            messageDiv.textContent = text;
            messageDiv.className = type;
        }

        resetBtn.addEventListener('click', async () => {
            const email = emailInput.value.trim();

            if (!email) {
                showMessage('請輸入您的電子郵件位址。', 'error');
                return;
            }

            resetBtn.disabled = true;
            showMessage('正在聯繫中樞發送郵件...', 'info');

            try {
                // Firebase 發送重設密碼郵件
                await sendPasswordResetEmail(auth, email);

                showMessage('郵件已成功發送！請檢查您的信箱。', 'success');
                // 成功後將按鈕變成導向登入
                resetBtn.innerText = "回到登入";
                resetBtn.onclick = () => window.location.href = '../login/';
                resetBtn.disabled = false;

            } catch (error) {
                resetBtn.disabled = false;
                console.error(error);
                let errorMsg = '發送失敗，請確認郵件格式是否正確。';
                if (error.code === 'auth/user-not-found') {
                    errorMsg = '找不到與此郵件關聯的帳號。';
                }
                showMessage(errorMsg, 'error');
            }
        });
    </script>
</body>

</html>
