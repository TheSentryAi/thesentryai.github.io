<!DOCTYPE html>
<html lang="zh-TW">

<head>
    <link rel="icon" type="image/x-icon" href="../images/logo_w.png">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>星崔AI | 帳號註冊</title>
    <style>
        :root {
            --bg-dark: #090b0c;
            --bg-deep: #2f3559;
            --primary: #7272b0;
            --accent: #b7a8bd;
            --text-light: #dcd5e5;
            --glass: rgba(9, 11, 12, 0.65);
            --border-soft: rgba(183, 168, 189, 0.2);
        }

        * {
            padding: 0;
            margin: 0;
            box-sizing: border-box;
            font-family: "PingFang TC", "Microsoft JhengHei", sans-serif;
            transition: all 0.4s cubic-bezier(0.165, 0.84, 0.44, 1);
        }

        body {
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            background-color: var(--bg-dark);
            background-image: radial-gradient(circle at 50% 50%, var(--bg-deep) 0%, var(--bg-dark) 100%);
            overflow: hidden;
            color: var(--text-light);
        }

        .signup-card {
            position: relative;
            z-index: 10;
            width: 420px;
            padding: 60px 45px;
            background: var(--glass);
            backdrop-filter: blur(20px);
            border: 1px solid var(--border-soft);
            border-radius: 40px;
            box-shadow: 0 20px 50px rgba(0, 0, 0, 0.5);
            text-align: center;
            cursor: default;
        }

        .signup-card:hover {
            border-color: var(--primary);
            box-shadow: 0 0 30px rgba(114, 114, 176, 0.4),
                inset 0 0 15px rgba(114, 114, 176, 0.2);
            transform: translateY(-5px);
        }

        .title-group {
            margin-bottom: 40px;
        }

        h2 {
            font-size: 38px;
            letter-spacing: 10px;
            color: #ffffff;
            font-weight: 700;
            margin-bottom: 6px;
            text-shadow: 0 0 10px rgba(255, 255, 255, 0.2);
        }

        .subtitle {
            font-size: 12px;
            letter-spacing: 5px;
            color: var(--accent);
            text-transform: uppercase;
            opacity: 0.8;
        }

        .input-group {
            position: relative;
            margin-bottom: 20px;
            width: 100%;
        }

        input {
            width: 100%;
            padding: 16px 22px;
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 15px;
            outline: none;
            color: #fff;
            font-size: 15px;
            letter-spacing: 1px;
        }

        input:focus {
            border-color: var(--primary);
            background: rgba(255, 255, 255, 0.08);
            box-shadow: 0 0 15px rgba(114, 114, 176, 0.3);
        }

        input::placeholder {
            color: rgba(224, 224, 229, 0.3);
        }

        .btn-signup {
            width: 100%;
            padding: 16px;
            margin-top: 20px;
            background: var(--primary);
            border: none;
            border-radius: 15px;
            color: #fff;
            font-size: 18px;
            font-weight: 600;
            letter-spacing: 8px;
            cursor: pointer;
            box-shadow: 0 8px 20px rgba(0, 0, 0, 0.3);
        }

        .btn-signup:hover {
            background: #8484c4;
            box-shadow: 0 12px 25px rgba(114, 114, 176, 0.4);
            letter-spacing: 10px;
        }

        .btn-signup:active {
            transform: scale(0.98);
        }

        .btn-signup:disabled {
            background: #3a3a4a;
            color: #777;
            cursor: not-allowed;
            transform: none;
        }

        .options {
            margin-top: 30px;
            font-size: 13px;
        }

        .options a {
            color: var(--accent);
            text-decoration: none;
            cursor: pointer;
            opacity: 0.7;
        }

        .options a:hover {
            opacity: 1;
            color: var(--text-light);
            text-decoration: underline;
        }

        #message {
            margin-top: 25px;
            min-height: 20px;
            font-size: 13px;
            line-height: 1.5;
        }

        .error {
            color: #ff8080;
        }

        .success {
            color: #a0d9a0;
        }

        .info {
            color: var(--accent);
        }

        /* --- 修改後的手機版響應式設計 --- */
        @media (max-width: 480px) {
            .signup-card {
                width: 90%;
                padding: 40px 25px;
            }

            h2 {
                font-size: 30px;
            }
        }
    </style>
</head>

<body>

    <div class="signup-card">
        <div class="title-group">
            <h2>註冊</h2>
            <div class="subtitle">SIGN UP</div>
        </div>

        <div class="input-group">
            <input type="email" id="signup-email" placeholder="電子郵件" required>
        </div>

        <div class="input-group">
            <input type="password" id="signup-password" placeholder="設定密碼 (至少 6 位)" required>
        </div>

        <div class="input-group">
            <input type="password" id="confirm-password" placeholder="確認密碼" required>
        </div>

        <button class="btn-signup" id="signupBtn">建立帳號</button>

        <div id="message"></div>

        <div class="options">
            <a href="../login/">已有帳號？立即登入</a>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/12.5.0/firebase-app.js";
        import {
            getAuth,
            createUserWithEmailAndPassword,
            sendEmailVerification,
            signOut
        } from "https://www.gstatic.com/firebasejs/12.5.0/firebase-auth.js";

        const firebaseConfig = {
            apiKey: "AIzaSyCtbjdi-x3E3eNgX8WvBtgibOTRG4idny4",
            authDomain: "workai-1d692.firebaseapp.com",
            projectId: "workai-1d692",
            storageBucket: "workai-1d692.firebasestorage.app",
            messagingSenderId: "156453625217",
            appId: "1:156453625217:web:f04e2da964ddb6d449dc80",
            measurementId: "G-71NV0L4CGS"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);

        const emailInput = document.getElementById('signup-email');
        const passwordInput = document.getElementById('signup-password');
        const confirmInput = document.getElementById('confirm-password');
        const signupBtn = document.getElementById('signupBtn');
        const messageDiv = document.getElementById('message');

        function showMessage(text, type) {
            messageDiv.textContent = text;
            messageDiv.className = type;
        }

        const handleSignUp = async () => {
            const email = emailInput.value;
            const password = passwordInput.value;
            const confirm = confirmInput.value;

            if (!email || !password || !confirm) {
                showMessage('❌ 請填寫所有欄位。', 'error');
                return;
            }

            if (password !== confirm) {
                showMessage('❌ 兩次輸入的密碼不一致。', 'error');
                return;
            }

            if (password.length < 6) {
                showMessage('❌ 密碼長度需至少 6 位。', 'error');
                return;
            }

            signupBtn.disabled = true;
            showMessage('正在處理您的請求並發送驗證郵件...', 'info');

            try {
                const userCredential = await createUserWithEmailAndPassword(auth, email, password);
                const user = userCredential.user;

                await sendEmailVerification(user);
                await signOut(auth);

                showMessage(`✅ 註冊成功！驗證郵件已發送至 ${email}，請驗證後再行登入。`, 'success');

                setTimeout(() => {
                    window.location.href = '../login/';
                }, 4000);

            } catch (error) {
                signupBtn.disabled = false;
                console.error("註冊錯誤:", error);

                let errorMsg = '❌ 註冊失敗，請稍後再試。';

                if (error.code === 'auth/email-already-in-use') {
                    errorMsg = '❌ 此電子郵件已被註冊，請嘗試登入。';
                } else if (error.code === 'auth/invalid-email') {
                    errorMsg = '❌ 電子郵件格式無效。';
                } else if (error.code === 'auth/weak-password') {
                    errorMsg = '❌ 密碼強度不足，請使用更複雜的密碼。';
                } else if (error.code === 'auth/operation-not-allowed') {
                    errorMsg = '❌ 伺服器目前不允許此操作。';
                }

                showMessage(errorMsg, 'error');
            }
        };

        signupBtn.addEventListener('click', handleSignUp);

        [emailInput, passwordInput, confirmInput].forEach(input => {
            input.addEventListener('keypress', (e) => {
                if (e.key === 'Enter') handleSignUp();
            });
        });
    </script>
</body>

</html>
